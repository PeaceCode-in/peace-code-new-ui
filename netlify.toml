[[redirects]]
  from = "/dashboard/*"
  to = "https://peacecode-dashboard.netlify.app/dashboard/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/login"
  to = "https://peacecode-dashboard.netlify.app/dashboard/login"
  status = 200
  force = true

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
